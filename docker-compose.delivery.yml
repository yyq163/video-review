services:
  migrate:
    image: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}@sha256:${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}
    build: !reset null
    environment:
      DELIVERY_IMAGE_REPOSITORY: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}
      DELIVERY_IMAGE_DIGEST: ${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}

  backend:
    image: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}@sha256:${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}
    build: !reset null
    environment:
      DELIVERY_IMAGE_REPOSITORY: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}
      DELIVERY_IMAGE_DIGEST: ${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}

  maintenance:
    image: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}@sha256:${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}
    build: !reset null
    environment:
      DELIVERY_IMAGE_REPOSITORY: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}
      DELIVERY_IMAGE_DIGEST: ${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}

  package-worker:
    image: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}@sha256:${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}
    build: !reset null
    environment:
      DELIVERY_IMAGE_REPOSITORY: ${BACKEND_IMAGE_REPOSITORY:?BACKEND_IMAGE_REPOSITORY is required}
      DELIVERY_IMAGE_DIGEST: ${BACKEND_IMAGE_DIGEST:?BACKEND_IMAGE_DIGEST is required}
