openapi: 3.1.0
info:
  title: Final Cut Review Contract
  version: "1.0"
  x-contract-version: "1.0"
servers:
  - url: /api/v1

x-standard-non-200-responses: &standardNon200Responses
  "400":
    $ref: "#/components/responses/BadRequest"
  "401":
    $ref: "#/components/responses/Unauthorized"
  "403":
    $ref: "#/components/responses/Forbidden"
  "404":
    $ref: "#/components/responses/NotFound"
  "409":
    $ref: "#/components/responses/Conflict"
  "413":
    $ref: "#/components/responses/PayloadTooLarge"
  "422":
    $ref: "#/components/responses/ValidationError"
  "500":
    $ref: "#/components/responses/InternalServerError"
  "503":
    $ref: "#/components/responses/StorageUnavailable"

security:
  - PrincipalContext: []
  - WriteGuardCookie: []
  - ReverseProxyWriteGuard: []

paths:
  /final-cut-review/module-manifest:
    get:
      operationId: module_manifest
      tags: [queries]
      responses:
        "200":
          description: Module manifest envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeModuleManifest"
        <<: *standardNon200Responses

  /final-cut-review/projects:
    get:
      operationId: list_projects
      tags: [queries]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Project list envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProjectList"
        <<: *standardNon200Responses

  /final-cut-review/projects/{project_ref_id}:
    get:
      operationId: get_project
      tags: [queries]
      parameters:
        - $ref: "#/components/parameters/ProjectRefId"
      responses:
        "200":
          description: Project envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProject"
        <<: *standardNon200Responses

  /final-cut-review/projects/{project_ref_id}/items:
