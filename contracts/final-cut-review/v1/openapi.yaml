              schema:
                $ref: "#/components/schemas/EnvelopeThreadMessageList"
        <<: *standardNon200Responses

  /final-cut-review/projects/{project_ref_id}/items/{review_item_id}/versions/{version_id}/stream:
    get:
      operationId: stream_review_version
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/ProjectRefId"
        - $ref: "#/components/parameters/ReviewItemId"
        - $ref: "#/components/parameters/VersionId"
        - $ref: "#/components/parameters/RangeHeader"
      responses:
        "200":
          description: Full media stream.
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/quicktime:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: Partial media stream.
          headers:
            Accept-Ranges:
              schema: {type: string}
            Content-Range:
              schema: {type: string}
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/quicktime:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        <<: *standardNon200Responses

  /final-cut-review/projects/{project_ref_id}/items/{review_item_id}/finalization:
