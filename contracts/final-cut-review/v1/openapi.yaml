          $ref: "#/components/responses/PayloadTooLarge"
        <<: *standardNon200Responses

  /final-cut-review/review/projects/{project_ref_id}/finalized-originals/packages/{package_id}:
    get:
      operationId: get_package
      tags: [package]
      parameters:
        - $ref: "#/components/parameters/ProjectRefId"
        - $ref: "#/components/parameters/PackageId"
      responses:
        "200":
          description: Package snapshot envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopePackageSnapshot"
        "410":
          $ref: "#/components/responses/Gone"
        <<: *standardNon200Responses

  /final-cut-review/review/projects/{project_ref_id}/finalized-originals/packages/{package_id}/download-session:
    post:
      operationId: authorize_package_download
      tags: [package]
      description: Exchanges a ready-package header token for a 120-second, path-scoped, HttpOnly browser download cookie. Trusted proxies must provide a valid X-Forwarded-Proto value.
      parameters:
        - $ref: "#/components/parameters/ProjectRefId"
        - $ref: "#/components/parameters/PackageId"
        - $ref: "#/components/parameters/PackageDownloadToken"
      responses:
        "200":
          description: Browser download session envelope. The response sets the short-lived package download cookie.
          headers:
            Set-Cookie:
              description: Path-scoped, HttpOnly, SameSite=Strict package download cookie; Secure when the trusted request scheme is HTTPS.
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopePackageDownloadSession"
        "410":
          $ref: "#/components/responses/Gone"
        <<: *standardNon200Responses

  /final-cut-review/review/projects/{project_ref_id}/finalized-originals/packages/{package_id}/download:
    get:
      operationId: download_package
      tags: [package]
      description: Streams the ready ZIP only after atomically consuming the one-shot, path-scoped browser download session cookie. One active lease per package limits concurrent integrity scans and streams.
      parameters:
        - $ref: "#/components/parameters/ProjectRefId"
        - $ref: "#/components/parameters/PackageId"
      responses:
        "200":
          description: Finalized originals ZIP package.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "410":
          $ref: "#/components/responses/Gone"
        <<: *standardNon200Responses

  /files/uploads/init:
    post:
      operationId: init_upload
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInitRequest"
      responses:
        "200":
          description: Upload session envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadSession"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        <<: *standardNon200Responses

  /files/uploads/{upload_id}/parts/{part_no}:
    put:
      operationId: upload_part
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/UploadId"
        - $ref: "#/components/parameters/PartNo"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Upload session envelope after part write.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadSession"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        <<: *standardNon200Responses

  /files/uploads/{upload_id}:
    get:
      operationId: get_upload
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/UploadId"
      responses:
        "200":
          description: Upload session envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadSession"
        <<: *standardNon200Responses

  /files/uploads/{upload_id}/complete:
    post:
      operationId: complete_upload
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/UploadId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Completed upload session envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadSession"
        <<: *standardNon200Responses

  /files/uploads/{upload_id}/abort:
    post:
      operationId: abort_upload
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/UploadId"
      responses:
        "200":
          description: Aborted upload session envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeUploadSession"
        <<: *standardNon200Responses

components:
  securitySchemes:
    PrincipalContext:
      type: apiKey
      in: header
      name: X-Principal-Context
      description: Signed principal context token issued by the trusted host.
    WriteGuardCookie:
      type: apiKey
      in: cookie
      name: fj_write_guard
    ReverseProxyWriteGuard:
      type: apiKey
      in: header
      name: X-Write-Guard-Verified

  parameters:
    ProjectRefId:
      name: project_ref_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    ReviewItemId:
      name: review_item_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    VersionId:
      name: version_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    IssueId:
      name: issue_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    PackageId:
      name: package_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    PackageDownloadToken:
      name: X-Package-Download-Token
      in: header
      required: true
      schema: {type: string, minLength: 1}
    UploadId:
      name: upload_id
      in: path
      required: true
      schema: {type: string, minLength: 1}
    PartNo:
      name: part_no
      in: path
      required: true
      schema: {type: integer, minimum: 1, maximum: 256}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 1, maxLength: 256}
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string, pattern: '^"?[0-9]+"?$'}
    RangeHeader:
      name: Range
      in: header
      required: false
      schema: {type: string, pattern: "^bytes=[0-9]*-[0-9]*$"}
    Page:
      name: page
      in: query
      required: false
      schema: {type: integer, minimum: 1, default: 1}
    PageSize:
      name: page_size
      in: query
      required: false
      schema: {type: integer, minimum: 1, maximum: 200, default: 50}

  responses:
    CreatedEnvelope:
      description: Created response envelope for asynchronous compatible clients.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeAny"
    AcceptedEnvelope:
      description: Accepted response envelope for asynchronous compatible clients.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeAny"
    BadRequest:
      description: Bad request error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Missing or invalid caller identity envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Capability, principal, or write guard denial envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Resource not found envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: State, idempotency, lock, or database conflict envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    PayloadTooLarge:
      description: Request payload exceeds the bounded endpoint limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Gone:
      description: Expired resource error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: Contract validation error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalServerError:
      description: Internal server error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    StorageUnavailable:
      description: Storage backend unavailable error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorBody:
      type: object
      required: [code, message, http_status, details, request_id, timestamp, contract_version]
      additionalProperties: false
      properties:
        code:
          type: string
          enum:
            - VALIDATION_ERROR
            - RESOURCE_NOT_FOUND
            - METHOD_NOT_ALLOWED
            - ENTRY_CAPABILITY_DENIED
            - PRINCIPAL_AUTHENTICATION_REQUIRED
            - PRINCIPAL_PERMISSION_DENIED
            - WRITE_GUARD_REQUIRED
            - WRITE_GUARD_INVALID
            - RESOURCE_STATE_CONFLICT
            - PORT_OPERATION_NOT_SUPPORTED
            - PLAYBACK_NOT_READY
            - VERSION_NOT_CURRENT
            - REVIEW_IN_PROGRESS
            - REVIEW_ITEM_FINALIZED
            - UNRESOLVED_ISSUES_EXIST
            - NO_UNRESOLVED_ISSUE
            - VERSION_FILE_NOT_READY
            - FILE_HASH_MISMATCH
            - UPLOAD_INCOMPLETE
            - IDEMPOTENCY_CONFLICT
            - OPTIMISTIC_LOCK_CONFLICT
            - PACKAGE_NO_FINALIZED_FILES
            - PACKAGE_SOURCE_MISSING
            - PACKAGE_NOT_READY
            - PACKAGE_EXPIRED
            - FILE_TYPE_NOT_ALLOWED
            - FILE_TOO_LARGE
            - STORAGE_UNAVAILABLE
            - INTERNAL_SERVER_ERROR
        message: {type: string}
        http_status: {type: integer, minimum: 400, maximum: 599}
        details:
          type: object
          additionalProperties: true
        request_id: {type: string}
        timestamp: {type: string, format: date-time}
        contract_version: {type: string, const: "1.0"}

    ResponseMeta:
      type: object
      required: [request_id, contract_version]
      additionalProperties: false
      properties:
        request_id: {type: string}
        contract_version: {type: string, const: "1.0"}
        total_count: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1}

    ListResponseMeta:
      type: object
      required: [request_id, contract_version, total_count, page, page_size]
      additionalProperties: false
      properties:
        request_id: {type: string}
        contract_version: {type: string, const: "1.0"}
        total_count: {type: integer, minimum: 0}
        page: {type: integer, minimum: 1}
        page_size: {type: integer, minimum: 1}

    EnvelopeAny:
      type: object
      required: [data, meta]
      additionalProperties: false
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    ErrorEnvelope:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    EnvelopeProjectList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ProjectDTO"
    EnvelopeProject:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ProjectDTO"
    EnvelopeReviewItemList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReviewItemDTO"
    EnvelopeReviewItem:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ReviewItemDTO"
    EnvelopeReviewVersionList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReviewVersionDTO"
    EnvelopeReviewVersion:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ReviewVersionDTO"
    EnvelopeReviewIssueList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReviewIssueDTO"
    EnvelopeReviewIssue:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ReviewIssueDTO"
    EnvelopeReviewIssueRevisionList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ReviewIssueRevisionDTO"
    EnvelopeThreadMessageList:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            meta:
              $ref: "#/components/schemas/ListResponseMeta"
            data:
              type: array
              items:
                $ref: "#/components/schemas/ThreadMessageDTO"
    EnvelopeThreadMessage:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ThreadMessageDTO"
    EnvelopeNullableFinalization:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              anyOf:
                - $ref: "#/components/schemas/FinalizationDTO"
                - type: "null"
    EnvelopeFinalization:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/FinalizationDTO"
    EnvelopePackageSnapshot:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PackageSnapshotDTO"
    EnvelopePackageDownloadSession:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PackageDownloadSessionDTO"
    EnvelopeUploadSession:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UploadSessionDTO"
    EnvelopeWriteGuardSession:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/WriteGuardSessionDTO"
    EnvelopeModuleManifest:
      allOf:
        - $ref: "#/components/schemas/EnvelopeAny"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ModuleManifest"

    CommandEnvelopeBase:
      type: object
      required: [command_id, command_type, contract_version, payload]
      additionalProperties: false
      properties:
        command_id: {type: string, minLength: 1, maxLength: 256}
        command_type: {$ref: "#/components/schemas/CommandType"}
        contract_version: {type: string, const: "1.0"}
        expected_aggregate_version:
          type: integer
          minimum: 1
        payload:
          type: object

    CommandType:
      type: string
      enum:
        - CreateProject
        - UpdateProject
        - ArchiveProject
        - RestoreProject
        - SoftDeleteProject
        - CreateReviewItem
        - UpdateReviewItem
        - DeleteReviewItem
        - UploadReviewVersion
        - StartReview
        - CreateReviewIssue
        - UpdateReviewIssue
        - AddReviewMessage
        - ResolveReviewIssue
        - ReopenReviewIssue
        - SoftDeleteReviewIssue
        - RequestChanges
        - FinalizeVersion
        - PrepareFinalizedPackage

    CreateProjectCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: CreateProject}
            payload: {$ref: "#/components/schemas/CreateProjectPayload"}
    UpdateProjectCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: UpdateProject}
            payload: {$ref: "#/components/schemas/UpdateProjectPayload"}
    ArchiveProjectCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: ArchiveProject}
            payload: {$ref: "#/components/schemas/ProjectAncestryPayload"}
    RestoreProjectCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: RestoreProject}
            payload: {$ref: "#/components/schemas/ProjectAncestryPayload"}
    SoftDeleteProjectCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: SoftDeleteProject}
            payload: {$ref: "#/components/schemas/SoftDeleteProjectPayload"}
    CreateReviewItemCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: CreateReviewItem}
            payload: {$ref: "#/components/schemas/CreateReviewItemPayload"}
    UpdateReviewItemCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: UpdateReviewItem}
            payload: {$ref: "#/components/schemas/UpdateReviewItemPayload"}
    DeleteReviewItemCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: DeleteReviewItem}
            payload: {$ref: "#/components/schemas/DeleteReviewItemPayload"}
    UploadReviewVersionCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: UploadReviewVersion}
            payload: {$ref: "#/components/schemas/UploadReviewVersionPayload"}
    StartReviewCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: StartReview}
            payload: {$ref: "#/components/schemas/StartReviewPayload"}
    CreateReviewIssueCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: CreateReviewIssue}
            payload: {$ref: "#/components/schemas/CreateReviewIssuePayload"}
    UpdateReviewIssueCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: UpdateReviewIssue}
            payload: {$ref: "#/components/schemas/UpdateReviewIssuePayload"}
    AddReviewMessageCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: AddReviewMessage}
            payload: {$ref: "#/components/schemas/AddReviewMessagePayload"}
    ResolveReviewIssueCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: ResolveReviewIssue}
            payload: {$ref: "#/components/schemas/IssueAncestryPayload"}
    ReopenReviewIssueCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: ReopenReviewIssue}
            payload: {$ref: "#/components/schemas/IssueAncestryPayload"}
    SoftDeleteReviewIssueCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: SoftDeleteReviewIssue}
            payload: {$ref: "#/components/schemas/IssueAncestryPayload"}
    RequestChangesCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: RequestChanges}
            payload: {$ref: "#/components/schemas/RequestChangesPayload"}
    FinalizeVersionCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: FinalizeVersion}
            payload: {$ref: "#/components/schemas/FinalizeVersionPayload"}
    PrepareFinalizedPackageCommandEnvelope:
      allOf:
        - $ref: "#/components/schemas/CommandEnvelopeBase"
        - type: object
          properties:
            command_type: {type: string, const: PrepareFinalizedPackage}
            payload: {$ref: "#/components/schemas/PrepareFinalizedPackagePayload"}

    CreateProjectPayload:
      type: object
      required: [project_code, project_name]
      additionalProperties: false
      properties:
        project_code: {type: string, minLength: 1, maxLength: 128}
        project_name: {type: string, minLength: 1, maxLength: 255}
        description: {type: string, maxLength: 2000}
        external_project_id: {type: string, minLength: 1, maxLength: 128}
    UpdateProjectPayload:
      type: object
      required: [project_ref_id, project_name, description]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        project_name: {type: string, minLength: 1, maxLength: 255}
        description: {type: string, maxLength: 2000}
    ProjectAncestryPayload:
      type: object
      required: [project_ref_id]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
    SoftDeleteProjectPayload:
      type: object
      required: [project_ref_id, confirmed]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        confirmed: {type: boolean, const: true}
    CreateReviewItemPayload:
      type: object
      required: [project_ref_id, item_code, title, original_file_id]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        item_code: {type: string, minLength: 1, maxLength: 128}
        episode_no: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 512}
        original_file_id: {type: string, minLength: 1}
        version_note: {type: string}
    UpdateReviewItemPayload:
      type: object
      required: [project_ref_id, review_item_id]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        review_item_id: {type: string, minLength: 1}
        episode_no: {type: integer, minimum: 1}
        title: {type: string, minLength: 1, maxLength: 512}
    DeleteReviewItemPayload:
      type: object
      required: [project_ref_id, review_item_id, confirmed]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        review_item_id: {type: string, minLength: 1}
        confirmed: {type: boolean, const: true}
    UploadReviewVersionPayload:
      type: object
      required: [project_ref_id, review_item_id, original_file_id]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        review_item_id: {type: string, minLength: 1}
        original_file_id: {type: string, minLength: 1}
        version_note: {type: string}
        change_summary: {type: string}
        supersede_reason: {type: string}
    StartReviewPayload:
      type: object
      required: [project_ref_id, review_item_id]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        review_item_id: {type: string, minLength: 1}
    CreateReviewIssuePayload:
      type: object
      required: [project_ref_id, review_item_id, version_id, content, timestamp_ms, frame_number]
      additionalProperties: false
      properties:
        project_ref_id: {type: string, minLength: 1}
        review_item_id: {type: string, minLength: 1}
        version_id: {type: string, minLength: 1}
        content: {type: string, minLength: 1, maxLength: 4000}
        timestamp_ms: {type: integer, minimum: 0}
        frame_number: {type: integer, minimum: 0}
        annotation:
          $ref: "#/components/schemas/ReviewAnnotationSetInput"
