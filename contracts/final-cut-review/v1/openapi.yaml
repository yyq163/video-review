        - $ref: "#/components/parameters/ReviewItemId"
        - $ref: "#/components/parameters/RangeHeader"
      responses:
        "200":
          description: Frozen finalized original file.
          headers:
            Accept-Ranges:
              schema: {type: string}
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            video/mp4:
              schema:
                type: string
                format: binary
            video/quicktime:
              schema:
                type: string
                format: binary
        "206":
          description: Partial frozen finalized original file.
          headers:
            Accept-Ranges:
              schema: {type: string}
            Content-Range:
              schema: {type: string}
          content:
            application/octet-stream:
              schema:
